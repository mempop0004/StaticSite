  <title lang="en">AI code review checklist for safer pull requests</title>
  <title lang="ko">AI 코드 리뷰를 더 안전하게 쓰는 체크리스트</title>

  <description lang="en">Use AI in pull request review without handing over judgment. This checklist shows what AI can speed up, what must stay manual, and where risky assumptions hide.</description>
  <description lang="ko">AI를 PR 리뷰에 쓰되 판단까지 넘기지 않는 기준을 정리한다. 무엇을 빨리 볼 수 있는지, 무엇은 직접 봐야 하는지, 위험한 가정은 어디에 숨어 있는지 체크리스트로 묶는다.</description>

  <tags lang="en">ai code review, pull request, review checklist, developer ai, pr review</tags>
  <tags lang="ko">AI코드리뷰, PR리뷰, 체크리스트, 개발자AI, 코드검토</tags>

  <body lang="en"><![CDATA[
<p>AI is useful in code review when it reduces scanning cost, not when it replaces technical judgment. The failure mode is simple: the review feels fast, but risky assumptions slip through because no one owned the final call.</p>

<p>Use the <a href="/units/blog-ai-for-developers/">developer AI unit page</a> as the index for follow-up posts on debugging, tests, documentation, and narrower review workflows.</p>

<h2>1. Use AI for first-pass scanning</h2>
<p>AI is good at summarizing changed files, spotting repeated patterns, and pointing out obvious omissions. That makes it a strong first-pass filter.</p>

<h2>2. Keep ownership on risky decisions</h2>
<p>Security, data integrity, auth, payment, and migration logic should never be accepted because an AI review looked confident. Those areas still need explicit manual review.</p>
<p>Examples include permission checks, SQL queries, race conditions around background jobs, and migration scripts that change production data.</p>

<h2>3. Check assumptions, not just comments</h2>
<p>The most valuable review step is testing whether the AI assumed hidden context. If a suggestion depends on a file, env var, or behavior that does not exist, the review is already off track.</p>

<h2>4. Lock a short checklist</h2>
<p>A practical checklist can stay small: changed scope, risky path, missing tests, hidden assumptions, and rollback impact. If AI cannot help you on one of those, the manual reviewer should still cover it.</p>
<image-slot code="002" alt-en="An explanatory image showing an AI review summary being validated against a short checklist for risk, tests, and assumptions." alt-ko="AI 리뷰 요약을 짧은 체크리스트로 검증하는 흐름을 보여주는 설명 이미지."></image-slot>

<h2>What to do first</h2>
<p>Take one recent pull request and run it through a five-point checklist. Compare that with an AI-assisted pass, then keep only the review steps that clearly reduce time without reducing trust.</p>
]]></body>

  <body lang="ko"><![CDATA[
<p>AI 코드 리뷰의 장점은 판단을 대신하는 것이 아니라, 스캔 비용을 줄여주는 데 있다. 위험한 부분은 사람이 더 빨리 찾게 해주되, 최종 판단권은 계속 사람이 쥐고 있어야 한다.</p>

<p>이 주제의 후속 글은 <a href="/ko/units/blog-ai-for-developers/">개발자 AI 활용 유닛 페이지</a>를 기준으로 디버깅, 테스트, 문서화 흐름으로 확장하면 된다.</p>

<h2>1. 1차 스캔 단계에 먼저 쓴다</h2>
<p>AI는 변경 파일 요약, 반복 패턴, 빠진 테스트 같은 1차 스캔에 강하다. 그래서 첫 패스에서 시간을 줄이는 용도로 가장 실용적이다.</p>

<h2>2. 위험한 결정은 사람이 끝까지 본다</h2>
<p>보안, 인증, 결제, 데이터 무결성, 마이그레이션 로직은 AI가 자신 있게 말해도 그대로 넘기면 안 된다. 이 영역은 항상 사람이 최종 검토해야 한다.</p>
<p>예를 들어 권한 체크, SQL 쿼리, 백그라운드 작업의 경쟁 상태, 실제 데이터를 바꾸는 마이그레이션은 AI가 맞는 말처럼 보여도 사람이 끝까지 봐야 한다.</p>

<h2>3. 코멘트보다 가정을 확인한다</h2>
<p>실무에서 더 위험한 건 틀린 코멘트보다 숨은 가정이다. 존재하지 않는 파일, 없는 환경변수, 실제와 다른 동작을 전제로 리뷰하고 있지는 않은지 먼저 봐야 한다.</p>

<h2>4. 짧은 체크리스트를 고정한다</h2>
<p>체크리스트는 길 필요가 없다. 변경 범위, 위험 경로, 테스트 누락, 숨은 가정, 롤백 영향 정도만 고정해도 리뷰 품질이 훨씬 안정된다.</p>
<image-slot code="002" alt-en="An explanatory image showing an AI review summary being validated against a short checklist for risk, tests, and assumptions." alt-ko="AI 리뷰 요약을 짧은 체크리스트로 검증하는 흐름을 보여주는 설명 이미지."></image-slot>

<h2>무엇부터 시작할까</h2>
<p>최근 PR 하나를 골라 다섯 항목 체크리스트로 다시 봐라. 그다음 AI를 같이 써보고, 실제로 시간을 줄여주면서 신뢰도는 안 깎는 부분만 남기면 된다.</p>
