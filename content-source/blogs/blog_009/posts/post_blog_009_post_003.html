    <script id="post-source" type="text/plain"><post slug="how-to-match-review-files-and-posts-without-drift" blog-id="blog-web-content-production-system" stage="pillar" purpose="problem-fix" search-intent="fix" reader-state="stuck" section-style="checklist" image-need="cover-only" timestamp="2026-04-14T09:00:00+09:00" updated-date="2026-04-14T09:00:00+09:00" hero-image="../../../assets/blog-placeholder-1.jpg" related-slugs=""><images><slot code="001" role="cover"><prompt>이 글의 핵심 맥락을 한 장면에서 바로 읽을 수 있는 대표 이미지를 만들어줘.

이미지 역할: 대표 Hero 이미지
이미지 설명: 리뷰 파일과 포스트 매칭이 정확히 맞아야 한다는 핵심을 한 장면에서 보여준다

공통 기준:

- 실제 운영 자료처럼 보여야 함 (카드, 항목, 상태 표시)
- 3D, 실사, 등각, 스톡 감성 금지
- 텍스트는 최소, 정보 구조만 보여준다

개별 프롬프트:
post identity card and review identity card snapping into perfect alignment on a data table, with a small mismatch warning hidden behind. document/data visual, flat editorial, high contrast, no arrows

참고 검색어:
review file mapping, content review system, post file matching</prompt></slot><slot code="002" role="inline"><prompt>이 글의 본문에서 실제 설명을 돕는 보조 이미지를 만들어줘.

이미지 역할: 본문 설명 이미지
이미지 설명: blog id, post id, slug, generated markdown, review record가 한 줄로 맞물리는 흐름을 보여준다

공통 기준:
- 문서/데이터 산출물처럼 보이는 설명 이미지
- 한 장면에 한 구조만 보여준다
- 설명 도식은 가능하되 텍스트는 최소

개별 프롬프트:
content identity chain with five linked cards: blog id, post id, slug, generated markdown, review record. flat data-visual worksheet, clean grid, no people, no screens

참고 검색어:
slug mapping, review alignment, content workflow integrity</prompt></slot></images><title lang="en">How to match review files and posts without drift</title><title lang="ko">리뷰 파일과 포스트를 어긋나지 않게 연결하는 방법</title><description lang="en">Review systems break when feedback attaches to the wrong post. This guide fixes matching rules with stable identity fields and movement rules.</description><description lang="ko">리뷰 파일이 다른 포스트에 붙는 순간 품질 관리가 무너진다. blog id, post 번호, slug로 리뷰-포스트 매칭 규칙을 고정하는 방법을 정리한다.</description><tags lang="en">review system, content production, file mapping, quality control, post review</tags><tags lang="ko">리뷰시스템, 콘텐츠제작, 파일매핑, 품질관리, 포스트검수</tags><body lang="en"><![CDATA[<p>Review systems fail quietly when feedback drifts onto the wrong post.</p>

<p>The fix is to treat every review as a record that must prove identity, not just a comment file.</p>

<h2>1. Lock the identity fields</h2>
<p>Use the same three fields everywhere: <strong>blog id</strong>, <strong>post number</strong>, and <strong>slug</strong>. A review without all three should be invalid.</p>

<h2>2. Make mismatches fail early</h2>
<p>When a slug changes, the review file must change too. If not, it should fail the build or be flagged before it attaches.</p>

<h2>3. Move reviews with the post</h2>
<p>When a post moves from studio to the real blog folder, its review file moves with it. If it stays behind, the link is broken.</p>

<figure class="article-inline-image">
  <img src="/generated-post-assets/post_blog_009_post_003-slot-002.png" alt="Identity chain linking blog id, post id, slug, generated markdown, and review record" loading="lazy" />
</figure>

<h2>What to do first</h2>
<p>Write the identity fields on every review and verify them before publishing.</p>

<ul>
  <li>blog id + post number + slug must match</li>
  <li>review file name must match slug</li>
  <li>review file moves with the post file</li>
</ul>

  <li><a href="/en/blog/how-to-build-an-image-slot-based-content-production-system/">Image slot workflow</a></li>
</ul>]]></body><body lang="ko"><![CDATA[<p>리뷰 시스템은 잘못된 피드백이 다른 포스트에 붙기 시작하는 순간부터 조용히 무너진다.</p>

<p>해법은 리뷰를 “코멘트 파일”이 아니라 “식별 레코드”로 다루는 것이다.</p>

<h2>1. 식별 필드를 고정한다</h2>
<p>모든 리뷰에 동일한 3개 필드를 넣는다. <strong>blog id</strong>, <strong>post 번호</strong>, <strong>slug</strong>. 하나라도 없으면 무효다.</p>

<h2>2. 어긋남은 즉시 실패로 본다</h2>
<p>slug가 바뀌면 리뷰 파일도 반드시 바뀌어야 한다. 안 바뀌면 빌드 실패나 검수 경고가 떠야 한다.</p>

<h2>3. 포스트 이동과 리뷰 이동을 묶는다</h2>
<p>포스트가 studio에서 실제 블로그 폴더로 이동하면 리뷰 파일도 같이 이동해야 한다. 남으면 연결이 끊긴다.</p>

<figure class="article-inline-image">
  <img src="/generated-post-assets/post_blog_009_post_003-slot-002.png" alt="blog id, post id, slug, generated markdown, review record가 이어진 식별 체인" loading="lazy" />
</figure>

<h2>What to do first</h2>
<p>모든 리뷰에 식별 필드를 적고 발행 전에 반드시 검증한다.</p>

<ul>
  <li>blog id + post 번호 + slug가 일치해야 한다</li>
  <li>리뷰 파일 이름은 slug와 같아야 한다</li>
  <li>리뷰 파일은 포스트 이동과 함께 움직여야 한다</li>
</ul>
