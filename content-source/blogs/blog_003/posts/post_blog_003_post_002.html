  <title lang="en">How to run robots.txt safely on a static site</title>
  <title lang="ko">정적 사이트 robots.txt를 안전하게 운영하는 기준</title>

  <description lang="en">A small robots.txt mistake can block indexing or expose the wrong paths. This guide explains what to lock, what not to block, and how to keep static site crawl rules safe.</description>
  <description lang="ko">robots.txt 한 줄 실수로 인덱싱이 막히거나 엉뚱한 경로가 노출될 수 있다. 정적 사이트에서 무엇을 잠그고 무엇은 막지 말아야 하는지 운영 기준으로 정리한다.</description>

  <tags lang="en">robots.txt, static site, crawl rules, indexing, sitemap</tags>
  <tags lang="ko">robots.txt, 정적사이트, 크롤링규칙, 인덱싱, 사이트맵</tags>

  <body lang="en"><![CDATA[
<p>On a static site, robots.txt is small enough to feel harmless. That is exactly why it causes expensive mistakes. One bad block can hide your entire content set from search or stop useful assets from being crawled.</p>

<p>Use the <a href="/units/blog-static-web-operations/">static website operations unit page</a> as the index for follow-up posts on indexing, assets, domains, and deployment checks.</p>

<h2>1. Robots is a crawl rule, not a privacy rule</h2>
<p>The first thing to lock is the purpose. Robots.txt tells crawlers what not to request. It does not protect private content by itself.</p>

<h2>2. Block less than you think</h2>
<p>Many sites block folders because they look technical. That is often wrong. Templates, assets, locale paths, or generated pages can disappear from search workflows if you block too broadly.</p>
<image-slot code="002" alt-en="An explanatory image showing a robots.txt allow/deny setup that keeps important pages crawlable while blocking noise." alt-ko="robots.txt에서 중요한 페이지는 허용하고 불필요한 경로는 차단하는 구조를 보여주는 설명 이미지."></image-slot>

<h2>3. Always keep the sitemap reference</h2>
<p>If you rely on search discovery, the sitemap line should be treated as part of your baseline. It belongs in the file and it should point to the live sitemap URL.</p>
<pre><code>User-agent: *
Allow: /
Sitemap: https://example.com/sitemap.xml</code></pre>

<h2>4. Verify the live file, not the local guess</h2>
<p>In static operations, a correct local file does not matter if the deployed host is serving something else. Always open the live robots URL after deployment.</p>

<h2>What to do first</h2>
<p>Review your current robots.txt with one question: is it blocking anything that search still needs to crawl? If the answer is unclear, your rule set is too loose to trust.</p>
]]></body>

  <body lang="ko"><![CDATA[
<p>정적 사이트에서 robots.txt는 작고 단순해 보여서 쉽게 넘기기 쉽다. 그런데 바로 그 점 때문에 큰 실수를 만든다. 한 줄만 잘못 막아도 전체 콘텐츠가 검색에서 사라지거나 필요한 경로가 크롤링되지 않을 수 있다.</p>

<p>후속 점검 글은 <a href="/ko/units/blog-static-web-operations/">정적 웹사이트 운영 유닛 페이지</a>를 기준으로 인덱싱, 자산, 도메인, 배포 흐름으로 이어가면 된다.</p>

<h2>1. robots는 비공개 장치가 아니라 크롤링 규칙이다</h2>
<p>가장 먼저 잠글 기준은 목적이다. robots.txt는 크롤러에게 무엇을 요청하지 말라고 말하는 파일이지, 비공개 보호 장치가 아니다.</p>

<h2>2. 생각보다 덜 막아야 한다</h2>
<p>기술적으로 보인다는 이유로 폴더를 넓게 막는 경우가 많다. 하지만 템플릿, 자산, locale 경로, generated 페이지까지 같이 막히면 검색 흐름 전체가 틀어질 수 있다.</p>
<image-slot code="002" alt-en="An explanatory image showing a robots.txt allow/deny setup that keeps important pages crawlable while blocking noise." alt-ko="robots.txt에서 중요한 페이지는 허용하고 불필요한 경로는 차단하는 구조를 보여주는 설명 이미지."></image-slot>

<h2>3. sitemap 줄은 기본선으로 넣는다</h2>
<p>검색 유입을 운영할 생각이라면 sitemap 줄은 기본 구성으로 봐야 한다. live sitemap URL을 가리키는 줄이 항상 포함돼 있어야 한다.</p>
<pre><code>User-agent: *
Allow: /
Sitemap: https://example.com/sitemap.xml</code></pre>

<h2>4. 로컬 파일이 아니라 live 응답을 확인한다</h2>
<p>정적 사이트 운영에서는 로컬 파일이 맞아도 배포 호스트가 다른 응답을 줄 수 있다. 배포 후에는 항상 live robots URL을 직접 열어서 확인해야 한다.</p>

<h2>무엇부터 시작할까</h2>
<p>지금 robots.txt를 보면서 한 가지만 먼저 물어보면 된다. 검색이 계속 필요한 경로를 혹시 막고 있지 않은가. 그 답이 불분명하면 아직 운영 규칙이 약한 상태다.</p>
]]></body>
