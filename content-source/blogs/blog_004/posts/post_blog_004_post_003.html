  <title lang="en">How to keep technical blog categories small and clear</title>
  <title lang="ko">기술 블로그 카테고리를 작고 선명하게 유지하는 방법</title>

  <description lang="en">When categories multiply, technical blogs become harder to browse and harder to grow. This guide shows what should stay a category, what should move to unit pages, and what should remain just a post.</description>
  <description lang="ko">카테고리가 늘어나면 기술 블로그는 찾기도 어렵고 확장도 어려워진다. 무엇을 카테고리로 남기고, 무엇을 유닛 페이지로 올리고, 무엇을 그냥 글로 두어야 하는지 운영 기준으로 정리한다.</description>

  <tags lang="en">technical blog, category structure, blog operations, topic cluster, internal links</tags>
  <tags lang="ko">기술블로그, 카테고리구조, 블로그운영, 토픽클러스터, 내부링크</tags>

  <body lang="en"><![CDATA[
<p>Technical blogs usually do not get messy because they lack content. They get messy because every slightly new topic gets promoted into a new category. Once that happens, the archive looks wider, but the structure gets weaker.</p>

<p>Use the <a href="/units/blog-technical-blog-operations/">technical blog operations unit page</a> as the anchor for related posts on internal links, image rules, and publishing structure. If you have not fixed the baseline yet, start with <a href="/blog/technical-blog-operations-rules-you-should-fix-first/">the rules you should fix first</a>. If your next problem is link flow rather than naming, continue with <a href="/blog/how-to-design-internal-links-for-a-technical-blog/">the internal link cluster guide</a>.</p>

<h2>1. A category should survive ten more posts</h2>
<p>The easiest test is time. If a label only makes sense for one narrow article streak, it is not a category. A category should still be useful after ten more posts land under the same theme.</p>
<p>For example, “Frontend” can survive expansion. “React image loading” usually should not. The second is better as a unit page or a support post cluster.</p>

<h2>2. Merge duplicates before readers feel the overlap</h2>
<p>Category systems break early through synonyms. “SEO”, “Search”, and “Search traffic” may feel different when you are writing, but they are often the same shelf from the reader's side. If the difference is hard to explain in one sentence, merge them now.</p>
<p>The same rule applies to pairs like “Deploy” and “Hosting”, or “AI workflow” and “AI operations”. If the archive feels like naming nuance instead of navigational help, the category layer is already too granular.</p>

<h2>3. Use categories for shelves, unit pages for clusters</h2>
<p>Categories should stay broad. Unit pages should collect a topic cluster. Individual posts should solve one narrower question. That three-layer split keeps the archive small without blocking content growth.</p>
<ul>
  <li>Category: technical blog operations</li>
  <li>Unit page: internal links, image rules, review loops</li>
  <li>Post: how to design internal links for a technical blog</li>
</ul>
<image-slot code="002" alt-en="A document-style structure map showing a small category set, broader unit pages, and narrower post clusters for a technical blog." alt-ko="작은 카테고리 집합과 더 넓은 유닛 페이지, 더 좁은 포스트 클러스터로 나뉜 기술 블로그 구조 지도를 보여주는 설명 이미지."></image-slot>

<h2>4. Test the structure from the outside</h2>
<p>Read your archive like a new visitor. Can they guess where a post belongs before clicking? Can they tell why two categories are different? If not, the structure is clever from the writer's side but unclear from the reader's side.</p>
<p>A good category system makes placement boring. That is the point. Readers should not need your internal logic to browse the site correctly.</p>

<h2>5. A smaller category set creates better internal links</h2>
<p>When categories stay small, internal links can carry the nuance. That is stronger than trying to encode every nuance in top-level navigation. Keep the shelf simple, then let pillar posts, support posts, and comparison posts carry the detail.</p>

<h2>What to do first</h2>
<p>List your current categories. Remove labels that only fit one or two posts. Merge overlapping names. Then choose one stable category and map three unit pages beneath it. If you cannot draw that structure cleanly, you do not need more categories. You need fewer.</p>
]]></body>

  <body lang="ko"><![CDATA[
<p>기술 블로그가 복잡해지는 이유는 글이 적어서가 아니다. 조금만 새로워 보이는 주제가 나올 때마다 카테고리로 승격시키기 때문이다. 그러면 아카이브는 넓어 보이지만 구조는 약해진다.</p>

<p>후속 글은 <a href="/ko/units/blog-technical-blog-operations/">기술 블로그 운영 유닛 페이지</a>를 기준으로 묶으면 된다. 기본 운영 기준이 아직 없다면 <a href="/ko/blog/technical-blog-operations-rules-you-should-fix-first/">먼저 고정해야 할 운영 기준 글</a>부터 확인하고, 이름보다 이동 경로가 먼저 문제라면 <a href="/ko/blog/how-to-design-internal-links-for-a-technical-blog/">토픽 클러스터 내부 링크 설계 글</a>로 이어가면 된다.</p>

<h2>1. 카테고리는 글 10개가 더 늘어나도 살아남아야 한다</h2>
<p>가장 쉬운 기준은 시간이다. 짧은 연속 포스팅 한 묶음에서만 의미가 있는 이름이라면 카테고리가 아니다. 카테고리는 같은 주제 아래 글이 10개 더 늘어나도 여전히 자연스럽게 남아야 한다.</p>
<p>예를 들어 “Frontend”는 확장을 견딘다. 하지만 “React image loading”은 보통 카테고리보다 유닛 페이지나 후속 글 묶음이 더 맞다.</p>

<h2>2. 독자가 겹침을 느끼기 전에 이름을 합친다</h2>
<p>카테고리 구조는 보통 동의어 때문에 빨리 무너진다. “SEO”, “Search”, “Search traffic”은 쓰는 사람 입장에선 달라 보여도 독자 입장에선 같은 선반일 수 있다. 한 문장으로 차이를 설명하기 어렵다면 지금 합치는 편이 낫다.</p>
<p>“Deploy”와 “Hosting”, “AI workflow”와 “AI operations”도 마찬가지다. 이름의 뉘앙스만 늘고 탐색 도움은 줄어든다면 이미 카테고리 층이 너무 잘게 쪼개진 상태다.</p>

<h2>3. 카테고리는 선반, 유닛 페이지는 클러스터</h2>
<p>카테고리는 넓게 두고, 유닛 페이지는 주제 묶음을 관리하고, 개별 포스트는 더 좁은 질문 하나를 해결하게 두는 것이 좋다. 이 3단 구조가 있어야 아카이브를 작게 유지하면서도 글은 계속 늘릴 수 있다.</p>
<ul>
  <li>카테고리: 기술 블로그 운영</li>
  <li>유닛 페이지: 내부 링크, 이미지 규칙, 리뷰 루프</li>
  <li>포스트: 기술 블로그 내부 링크를 토픽 클러스터 기준으로 설계하는 방법</li>
</ul>
<image-slot code="002" alt-en="A document-style structure map showing a small category set, broader unit pages, and narrower post clusters for a technical blog." alt-ko="작은 카테고리 집합과 더 넓은 유닛 페이지, 더 좁은 포스트 클러스터로 나뉜 기술 블로그 구조 지도를 보여주는 설명 이미지."></image-slot>

<h2>4. 밖에서 읽었을 때도 배치가 쉬워야 한다</h2>
<p>아카이브를 새 방문자처럼 읽어봐라. 클릭하기 전에도 어느 카테고리에 들어갈 글인지 짐작이 되는가. 두 카테고리의 차이를 바로 설명할 수 있는가. 이게 안 되면 쓰는 사람에겐 똑똑한 구조일지 몰라도 읽는 사람에겐 불명확한 구조다.</p>
<p>좋은 카테고리 구조는 배치가 지루할 정도로 명확해야 한다. 독자가 운영자의 머릿속 논리를 몰라도 제대로 탐색할 수 있어야 한다.</p>

<h2>5. 카테고리를 줄이면 내부 링크가 더 강해진다</h2>
<p>카테고리가 작아지면 미묘한 차이는 내부 링크가 맡을 수 있다. 모든 차이를 상단 구조에 억지로 올리는 것보다 훨씬 낫다. 선반은 단순하게 두고, 기준 글과 후속 글, 비교 글이 세부 맥락을 담당하게 하라.</p>

<h2>무엇부터 시작할까</h2>
<p>지금 카테고리를 전부 적어보고 한두 개 글에만 맞는 이름은 지운다. 겹치는 이름은 합친다. 그다음 하나의 안정적인 카테고리를 고르고 그 아래 유닛 페이지 세 개를 그려봐라. 이 구조가 깔끔하게 안 그려지면 카테고리가 더 필요한 게 아니라 더 적게 필요하다는 뜻이다.</p>
