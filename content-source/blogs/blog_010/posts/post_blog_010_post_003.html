    <script id="post-source" type="text/plain"><post slug="why-you-shouldnt-redirect-deleted-pages-to-home" blog-id="blog-real-world-web-troubleshooting" stage="pillar" purpose="problem-fix" search-intent="fix" reader-state="stuck" section-style="checklist" image-need="cover-only" timestamp="2026-04-14T09:00:00+09:00" updated-date="2026-04-14T09:00:00+09:00" hero-image="../../../assets/blog-placeholder-1.jpg" related-slugs=""><images><slot code="001" role="cover"><prompt>이 글의 핵심 맥락을 한 장면에서 바로 읽을 수 있는 대표 이미지를 만들어줘.

이미지 역할: 대표 Hero 이미지
이미지 설명: 삭제된 URL을 홈으로 보내는 잘못된 처리가 왜 문제인지 한 장면에서 보여준다

공통 기준:
- 그래픽 감성보다 문서/데이터 산출물 느낌이 우선
- 실제 운영 자료처럼 보여야 함 (카드, 항목, 상태 표시)
- 3D, 실사, 등각, 스톡 감성 금지
- 텍스트는 최소, 정보 구조만 보여준다

개별 프롬프트:
deleted URL status card incorrectly pointing to homepage, with a separate correct status card (404/410) shown as the proper state. document/data visual, flat editorial, high contrast, no arrows

참고 검색어:
homepage redirect problem, deleted page redirect, seo troubleshooting</prompt></slot><slot code="002" role="inline"><prompt>이 글의 본문에서 실제 설명을 돕는 보조 이미지를 만들어줘.

이미지 역할: 본문 설명 이미지
이미지 설명: 잘못된 홈 리다이렉트와 올바른 404/410 처리의 차이를 비교한다

공통 기준:
- 문서/데이터 산출물처럼 보이는 설명 이미지
- 한 장면에 한 구조만 보여준다
- 설명 도식은 가능하되 텍스트는 최소

개별 프롬프트:
comparison worksheet showing three outcomes for deleted URLs: homepage redirect (bad), 404 (neutral), 410 (clear). use simple status cards, flat data-visual style, no people, no screens

참고 검색어:
redirect comparison, 404 vs 410, deleted url handling</prompt></slot></images><title lang="en">Why you should not redirect deleted pages to home</title><title lang="ko">삭제된 페이지를 홈으로 보내면 안 되는 이유</title><description lang="en">Redirecting every deleted URL to the homepage hides the real state and confuses both users and crawlers. This guide explains why homepage redirects are a bad default.</description><description lang="ko">삭제된 URL을 전부 홈으로 보내면 정리한 것처럼 보여도 사용자와 검색엔진 모두에게 혼란을 준다. 홈 리다이렉트가 왜 나쁜 기본값인지 정리한다.</description><tags lang="en">redirect, 404, homepage redirect, troubleshooting, seo</tags><tags lang="ko">리다이렉트, 404, 홈페이지이동, 문제해결, SEO</tags><body lang="en"><![CDATA[<p>Sending deleted URLs to the homepage looks tidy, but it hides the true state of the URL.</p>

<p>The result is weak signals for crawlers and a confusing experience for users who expected a specific page.</p>

<h2>What users see first</h2>
<p>Users lose context instantly. The homepage rarely answers the question that led them to the deleted page.</p>

<h2>What crawlers infer</h2>
<p>Redirecting everything to home creates mixed signals. The crawler cannot tell whether the content moved, was deleted, or still exists.</p>

<h2>What to do instead</h2>
<p>Redirect only when there is a real replacement. Otherwise return a clear 404 or 410 and keep the signal honest.</p>

<figure class="article-inline-image">
  <img src="/generated-post-assets/post_blog_010_post_003-slot-002.png" alt="Comparison of homepage redirect vs proper 404 and 410 status handling" loading="lazy" />
</figure>

<h2>What to do first</h2>
<p>Pick one deleted URL group. If there is no true replacement, stop redirecting to home and return 404 or 410.</p>

  <li><a href="/en/blog/real-world-web-troubleshooting-rules-you-should-fix-first/">Foundational troubleshooting rules</a></li>
  <li><a href="/en/blog/when-to-use-404-410-and-redirects/">404/410 decision guide</a></li>
</ul>]]></body><body lang="ko"><![CDATA[<p>삭제된 URL을 전부 홈으로 보내면 리포트는 깔끔해 보여도 실제 상태는 가려진다.</p>

<p>사용자와 검색엔진 모두 “삭제됨”인지 “이동됨”인지 분명히 알 수 없는 상태가 된다.</p>

<h2>사용자가 먼저 느끼는 문제</h2>
<p>사용자는 즉시 맥락을 잃는다. 홈은 원래 찾던 질문을 해결해주지 못하는 경우가 대부분이다.</p>

<h2>검색엔진이 받는 신호</h2>
<p>모든 URL이 홈으로 이동하면 신호가 섞인다. 이동인지 삭제인지 모호해지고, 크롤러는 판단을 늦춘다.</p>

<h2>대신 해야 할 처리</h2>
<p>실제 대체물이 있을 때만 redirect를 쓰고, 아니라면 404나 410으로 정직하게 끝내야 한다.</p>

<figure class="article-inline-image">
  <img src="/generated-post-assets/post_blog_010_post_003-slot-002.png" alt="홈 리다이렉트와 404/410 처리 비교 시트" loading="lazy" />
</figure>

<h2>What to do first</h2>
<p>삭제된 URL 묶음을 하나 고른 뒤, 실제 대체물이 없는 경우부터 홈 리다이렉트를 끊어라.</p>
